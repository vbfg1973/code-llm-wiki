name: ci

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CodeLlmWiki.slnx

      - name: Build
        run: dotnet build CodeLlmWiki.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test CodeLlmWiki.slnx --configuration Release --no-build

      - name: Verify Generated Artifacts Are Current
        run: git diff --exit-code
